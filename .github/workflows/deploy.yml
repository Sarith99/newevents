name: Build and Blue-Green Deploy

# Trigger: run this pipeline on every push to the main branch
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # also allow manual runs from the GitHub UI

env:
  DOCKER_USER: sarith99          # your Docker Hub username
  NAMESPACE: newevent

jobs:
  # ---------- JOB 1: Build and push images ----------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        run: |
          docker build -t $DOCKER_USER/newevent-frontend:${{ github.sha }} -f Dockerfile .
          docker push $DOCKER_USER/newevent-frontend:${{ github.sha }}

      - name: Build and push Event Service
        run: |
          docker build -t $DOCKER_USER/event-service:${{ github.sha }} ./services/EventService
          docker push $DOCKER_USER/event-service:${{ github.sha }}

      - name: Build and push Program Service
        run: |
          docker build -t $DOCKER_USER/program-service:${{ github.sha }} ./services/ProgramService
          docker push $DOCKER_USER/program-service:${{ github.sha }}

      - name: Build and push Registration Service
        run: |
          docker build -t $DOCKER_USER/registration-service:${{ github.sha }} ./services/RegistrationService
          docker push $DOCKER_USER/registration-service:${{ github.sha }}

  # ---------- JOB 2: Blue-Green deploy ----------
  blue-green-deploy:
    needs: build-and-push       # only runs after images are built
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Configure kubectl for the cluster
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=kubeconfig" >> $GITHUB_ENV

      - name: Determine idle colour
        run: |
          LIVE=$(kubectl get service frontend -n $NAMESPACE -o jsonpath='{.spec.selector.version}')
          if [ "$LIVE" = "blue" ]; then
            echo "IDLE=green" >> $GITHUB_ENV
          else
            echo "IDLE=blue" >> $GITHUB_ENV
          fi
          echo "Currently live: $LIVE"

      - name: Deploy new version to the idle colour
        run: |
          kubectl set image deployment/frontend-$IDLE \
            frontend=$DOCKER_USER/newevent-frontend:${{ github.sha }} -n $NAMESPACE
          kubectl rollout status deployment/frontend-$IDLE -n $NAMESPACE

      - name: Switch traffic to the new version
        run: |
          kubectl patch service frontend -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"app\":\"frontend\",\"version\":\"$IDLE\"}}}"
          echo "Traffic switched to $IDLE"