apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service
  namespace: newevent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
        - name: registration-service
          image: registration-service:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__RegistrationDb
              valueFrom:
                secretKeyRef:
                  name: registration-db-secret
                  key: ConnectionStrings__RegistrationDb
            - name: EventServiceUrl
              value: "http://event-service"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /api/register
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/register
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
  namespace: newevent
spec:
  type: ClusterIP
  selector:
    app: registration-service
  ports:
    - port: 80
      targetPort: 8080